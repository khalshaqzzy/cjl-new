name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy to production
        required: true
        default: main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    env:
      APP_ENV: production
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || github.event.workflow_run.head_sha }}
      REMOTE_BASE_DIR: /opt/cjl/production
      REMOTE_RUNTIME_ENV: /opt/cjl/production/shared/runtime.env
      REMOTE_HOST: ${{ secrets.PRODUCTION_VM_HOST }}
      REMOTE_USER: ${{ secrets.PRODUCTION_VM_USER }}
      REMOTE_PORT: ${{ secrets.PRODUCTION_VM_SSH_PORT != '' && secrets.PRODUCTION_VM_SSH_PORT || '22' }}
      ADMIN_DOMAIN: admin.cjlaundry.com
      PUBLIC_DOMAIN: cjlaundry.com
      API_DOMAIN: api.cjlaundry.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Resolve release SHA
        run: echo "RELEASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Resolve deployment fingerprints
        shell: bash
        env:
          DEPLOY_RESET_TOKEN_SECRET: ${{ secrets.PRODUCTION_DEPLOY_RESET_TOKEN }}
        run: |
          if [[ -z "$DEPLOY_RESET_TOKEN_SECRET" ]]; then
            echo "Missing required secret: PRODUCTION_DEPLOY_RESET_TOKEN" >&2
            exit 1
          fi

          DEPLOY_RESET_FINGERPRINT="$(printf '%s' "$DEPLOY_RESET_TOKEN_SECRET" | sha256sum | awk '{print $1}')"
          echo "DEPLOY_RESET_FINGERPRINT=${DEPLOY_RESET_FINGERPRINT}" >> "$GITHUB_ENV"

      - name: Validate Cloud WhatsApp secrets
        shell: bash
        env:
          WHATSAPP_BUSINESS_ID: ${{ secrets.PRODUCTION_WHATSAPP_BUSINESS_ID }}
          WHATSAPP_WABA_ID: ${{ secrets.PRODUCTION_WHATSAPP_WABA_ID }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.PRODUCTION_WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.PRODUCTION_WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_APP_SECRET: ${{ secrets.PRODUCTION_WHATSAPP_APP_SECRET }}
          WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${{ secrets.PRODUCTION_WHATSAPP_WEBHOOK_VERIFY_TOKEN }}
        run: |
          for name in \
            WHATSAPP_BUSINESS_ID \
            WHATSAPP_WABA_ID \
            WHATSAPP_PHONE_NUMBER_ID \
            WHATSAPP_ACCESS_TOKEN \
            WHATSAPP_APP_SECRET \
            WHATSAPP_WEBHOOK_VERIFY_TOKEN; do
            value="${!name}"
            if [[ -z "${value// }" ]]; then
              echo "Missing required secret: PRODUCTION_${name}" >&2
              exit 1
            fi
          done

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_VM_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PRODUCTION_VM_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Prepare remote directories
        run: |
          ssh -p "$REMOTE_PORT" "$REMOTE_USER@$REMOTE_HOST" \
            "mkdir -p '$REMOTE_BASE_DIR/releases/$RELEASE_SHA' '$REMOTE_BASE_DIR/shared'"

      - name: Capture previous release
        run: |
          PREVIOUS_RELEASE=$(ssh -p "$REMOTE_PORT" "$REMOTE_USER@$REMOTE_HOST" "if [ -f '$REMOTE_BASE_DIR/current_release' ]; then cat '$REMOTE_BASE_DIR/current_release'; fi")
          echo "PREVIOUS_RELEASE=$PREVIOUS_RELEASE" >> "$GITHUB_ENV"

      - name: Upload release archive over SSH
        run: |
          git archive --format=tar "$RELEASE_SHA" \
            | ssh -p "$REMOTE_PORT" "$REMOTE_USER@$REMOTE_HOST" \
              "tar -xf - -C '$REMOTE_BASE_DIR/releases/$RELEASE_SHA'"

      - name: Render runtime env
        run: |
          cat > runtime.env <<EOF
          APP_ENV=production
          RELEASE_SHA=$RELEASE_SHA
          LOG_LEVEL=info
          COMPOSE_PROJECT_NAME=cjl-production
          SHARED_DIR=/opt/cjl/production/shared
          ADMIN_DOMAIN=$ADMIN_DOMAIN
          PUBLIC_DOMAIN=$PUBLIC_DOMAIN
          API_DOMAIN=$API_DOMAIN
          CADDY_EMAIL=${{ secrets.PRODUCTION_CADDY_EMAIL }}
          APP_TIMEZONE=Asia/Jakarta
          MONGO_ROOT_USERNAME=${{ secrets.PRODUCTION_MONGO_ROOT_USERNAME }}
          MONGO_ROOT_PASSWORD=${{ secrets.PRODUCTION_MONGO_ROOT_PASSWORD }}
          MONGO_DATABASE=${{ secrets.PRODUCTION_MONGO_DATABASE }}
          MONGO_REPLICA_KEY=${{ secrets.PRODUCTION_MONGO_REPLICA_KEY }}
          SESSION_SECRET=${{ secrets.PRODUCTION_SESSION_SECRET }}
          ADMIN_BOOTSTRAP_USERNAME=${{ secrets.PRODUCTION_ADMIN_BOOTSTRAP_USERNAME }}
          ADMIN_BOOTSTRAP_PASSWORD=${{ secrets.PRODUCTION_ADMIN_BOOTSTRAP_PASSWORD }}
          WHATSAPP_PROVIDER=cloud_api
          WHATSAPP_GRAPH_API_VERSION=v25.0
          WHATSAPP_GRAPH_API_BASE_URL=https://graph.facebook.com
          WHATSAPP_BUSINESS_ID=${{ secrets.PRODUCTION_WHATSAPP_BUSINESS_ID }}
          WHATSAPP_WABA_ID=${{ secrets.PRODUCTION_WHATSAPP_WABA_ID }}
          WHATSAPP_PHONE_NUMBER_ID=${{ secrets.PRODUCTION_WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_ACCESS_TOKEN=${{ secrets.PRODUCTION_WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_APP_SECRET=${{ secrets.PRODUCTION_WHATSAPP_APP_SECRET }}
          WHATSAPP_WEBHOOK_VERIFY_TOKEN=${{ secrets.PRODUCTION_WHATSAPP_WEBHOOK_VERIFY_TOKEN }}
          WHATSAPP_WEBHOOK_PATH=/v1/webhooks/meta/whatsapp
          WA_FAIL_MODE=never
          EOF

      - name: Upload runtime env
        run: |
          cat runtime.env | ssh -p "$REMOTE_PORT" "$REMOTE_USER@$REMOTE_HOST" \
            "cat > '$REMOTE_RUNTIME_ENV'"

      - name: Deploy on VM
        run: |
          ssh -p "$REMOTE_PORT" "$REMOTE_USER@$REMOTE_HOST" \
            "bash '$REMOTE_BASE_DIR/releases/$RELEASE_SHA/deploy/scripts/remote-deploy.sh' \
             '$APP_ENV' '$RELEASE_SHA' '$REMOTE_BASE_DIR' '$REMOTE_RUNTIME_ENV' '$DEPLOY_RESET_FINGERPRINT'"

      - name: Smoke-check production
        run: |
          bash deploy/scripts/smoke-check.sh \
            "https://$API_DOMAIN/health" \
            "https://$API_DOMAIN/ready" \
            "https://$ADMIN_DOMAIN" \
            "https://$PUBLIC_DOMAIN"

      - name: Validate Cloud readiness payload
        run: |
          bash deploy/scripts/assert-ready-cloud.sh "https://$API_DOMAIN/ready" "cloud_api"

      - name: Rollback production on failed smoke-check
        if: failure() && env.PREVIOUS_RELEASE != ''
        run: |
          ssh -p "$REMOTE_PORT" "$REMOTE_USER@$REMOTE_HOST" \
            "bash '$REMOTE_BASE_DIR/releases/$RELEASE_SHA/deploy/scripts/remote-rollback.sh' \
             '$APP_ENV' '$PREVIOUS_RELEASE' '$REMOTE_BASE_DIR' '$REMOTE_RUNTIME_ENV'"
